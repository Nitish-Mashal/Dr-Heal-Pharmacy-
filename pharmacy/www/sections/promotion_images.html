{% set promotions = frappe.db.sql("""
    SELECT
        pi.name1,
        pi.date,
        pi.is_active,
        pi.link,
        pi.attach_image
    FROM `tabPromotion Images` pi
    WHERE pi.is_active = 1
    ORDER BY pi.date DESC
    LIMIT 10
""", as_dict=True) %}

{% if promotions %}
<section class="container my-4">

  <!-- Wrapper -->
  <div class="promotion-wrapper">

    <!-- Left Arrow -->
    <button class="promotion-btn prev">‹</button>

    <!-- Scroll Container -->
    <div class="promotion-scroll">

      {% for promo in promotions %}
      <div class="promotion-card">
        <a href="{{ promo.link }}" target="_blank" class="text-decoration-none">

          <div class="card border rounded-4 shadow-sm position-relative">
            <img src="{{ promo.attach_image }}"
                 class="img-fluid promotion-img "
                 alt="{{ promo.name1 }}">
          </div>

        </a>
      </div>
      {% endfor %}

    </div>

    <!-- Right Arrow -->
    <button class="promotion-btn next">›</button>

  </div>
</section>
{% endif %}

<style>
.promotion-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.promotion-scroll {
  display: flex;
  gap: 16px;
  overflow-x: hidden;
  padding: 10px 50px;
  scroll-behavior: smooth;
}

.promotion-card {
  flex: 0 0 auto;
  width: 500px;
}

.promotion-img {
  width: 100%;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
  display: block;
}

/* Arrow buttons */
.promotion-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.15);
  color: #fff;
  border: none;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  font-size: 26px;
  cursor: pointer;
  z-index: 5;
}

.promotion-btn.prev { left: 0; }
.promotion-btn.next { right: 0; }

.promotion-card a:hover {
  text-decoration: none;
  opacity: 0.9;
}

@media (max-width: 768px) {

  .promotion-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 10px 0 10px 10px;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
  }

  .promotion-scroll::-webkit-scrollbar {
    display: none;
  }

  .promotion-card {
    flex: 0 0 80%;   /* Main card = 80% */
    width: 80%;
    scroll-snap-align: start;
  }

  .promotion-img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
  }

  .promotion-btn {
    display: none; /* hide arrows on mobile */
  }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const container = document.querySelector(".promotion-scroll");
    const prevBtn = document.querySelector(".promotion-btn.prev");
    const nextBtn = document.querySelector(".promotion-btn.next");

    if (!container) return;

    let autoScrollInterval;
    let isPaused = false;

    function getScrollAmount() {
        const card = container.querySelector(".promotion-card");

        if (!card) return 300;

        const gap = parseInt(
            window.getComputedStyle(container).gap || 16
        );

        return card.offsetWidth + gap;
    }

    function scrollNext() {
        const scrollAmount = getScrollAmount();

        if (
            container.scrollLeft + container.clientWidth >=
            container.scrollWidth - 10
        ) {
            container.scrollTo({
                left: 0,
                behavior: "smooth"
            });
        } else {
            container.scrollBy({
                left: scrollAmount,
                behavior: "smooth"
            });
        }
    }

    function scrollPrev() {
        const scrollAmount = getScrollAmount();

        container.scrollBy({
            left: -scrollAmount,
            behavior: "smooth"
        });
    }

    function startAutoScroll() {
        stopAutoScroll();

        autoScrollInterval = setInterval(() => {
            if (!isPaused) {
                scrollNext();
            }
        }, 3000);
    }

    function stopAutoScroll() {
        if (autoScrollInterval) {
            clearInterval(autoScrollInterval);
        }
    }

    function pauseAndResume() {
        isPaused = true;

        setTimeout(() => {
            isPaused = false;
        }, 3000);
    }

    if (nextBtn) {
        nextBtn.addEventListener("click", () => {
            scrollNext();
            pauseAndResume();
        });
    }

    if (prevBtn) {
        prevBtn.addEventListener("click", () => {
            scrollPrev();
            pauseAndResume();
        });
    }

    startAutoScroll();

    window.addEventListener("resize", () => {
        stopAutoScroll();
        startAutoScroll();
    });

});
</script>
